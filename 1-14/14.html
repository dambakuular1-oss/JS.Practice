<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Аккордеон</title>
  <style>
    #parent {
      margin: 0 auto;
      width: 400px;
    }
    .tab {
      margin-bottom: 10px;
    }

    .tab .link a {
      display: block;
      padding: 10px;
      color: black;
      text-decoration: none;
      text-align: center;
      background: #f8f8f8;
      border: 1px solid gray;
    }
    .tab .link:hover a {
      background: #f2f2f2;
    }

    .tab:not(.active) .text {
      display: none;
    }
    .tab .text {
      border: 1px dashed gray;
      border-top: none;
      padding: 10px;
      height: 300px;
    }
  </style>
</head>
<body>

<div id="parent">
  <div class="tab active">
    <div class="link"><a href="#">вкладка 1</a></div>
    <div class="text">текст вкладки 1</div>
  </div>
  <div class="tab">
    <div class="link"><a href="#">вкладка 2</a></div>
    <div class="text">текст вкладки 2</div>
  </div>
  <div class="tab">
    <div class="link"><a href="#">вкладка 3</a></div>
    <div class="text">текст вкладки 3</div>
  </div>
</div>

<script>
  const links = document.querySelectorAll('.tab .link a');

  links.forEach(function(link) {
    link.addEventListener('click', function(event) {
      event.preventDefault();

      const tab = link.closest('.tab');

      // Если кликнули на уже активную вкладку — закрываем её
      if (tab.classList.contains('active')) {
        tab.classList.remove('active');
        return;
      }

      // Снимаем active у текущей открытой вкладки
      const activeTab = document.querySelector('.tab.active');
      if (activeTab) {
        activeTab.classList.remove('active');
      }

      // Открываем новую
      tab.classList.add('active');
    });
  });
</script>

</body>
</html>
