<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вкладки</title>
  <style>
    #parent {
      margin: 0 auto;
      width: 400px;
    }

    .menu a {
      margin-right: 5px;
      display: inline-block;
      padding: 10px;
      color: black;
      text-decoration: none;
      border: 1px solid gray;
    }
    .menu a:hover {
      background: #f8f8f8;
    }
    .menu a.active {
      border-color: transparent;
      background: #f2f2f2;
    }

    .tabs .tab:not(.active) {
      display: none;
    }
    .tabs .tab {
      padding: 10px;
      background: #f2f2f2;
      height: 300px;
    }
  </style>
</head>
<body>

<div id="parent">
  <div class="menu">
    <a href="" class="active">вкладка 1</a>
    <a href="">вкладка 2</a>
    <a href="">вкладка 3</a>
  </div>
  <div class="tabs">
    <div class="tab active">
      текст вкладки 1
    </div>
    <div class="tab">
      текст вкладки 2
    </div>
    <div class="tab">
      текст вкладки 3
    </div>
  </div>
</div>

<script>
  const links = document.querySelectorAll('.menu a');
  const tabs  = document.querySelectorAll('.tabs .tab');

  links.forEach(function(link, index) {
    link.addEventListener('click', function(event) {
      event.preventDefault();

      // Снимаем active у текущей активной ссылки и вкладки
      document.querySelector('.menu a.active').classList.remove('active');
      document.querySelector('.tabs .tab.active').classList.remove('active');

      // Активируем нужную ссылку и вкладку по индексу
      link.classList.add('active');
      tabs[index].classList.add('active');
    });
  });
</script>

</body>
</html>
