<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Поиск HTML-тегов</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 1rem; }
    input { width: 100%; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; }
    #result { margin-top: 20px; font-size: 1rem; color: #333; }
  </style>
</head>
<body>

  <h2>Поиск HTML-тегов</h2>
  <input id="tag-input" type="text" placeholder="Введите тег, например: div" />
  <div id="result"></div>

  <script>
    const tags = {
      div:    "Универсальный блочный контейнер для группировки элементов.",
      p:      "Абзац текста.",
      a:      "Гиперссылка. Атрибут href задаёт адрес назначения.",
      img:    "Встраивает изображение. Атрибут alt обязателен.",
      input:  "Поле ввода. Тип задаётся атрибутом type.",
      button: "Интерактивная кнопка.",
      span:   "Универсальный строчный контейнер без семантики.",
      h1:     "Заголовок первого уровня — главный заголовок страницы.",
      h2:     "Заголовок второго уровня.",
      ul:     "Маркированный список. Дочерние элементы — li.",
      ol:     "Нумерованный список. Дочерние элементы — li.",
      li:     "Элемент списка внутри ul или ol.",
      table:  "Таблица данных. Строки — tr, ячейки — td или th.",
      form:   "HTML-форма для отправки данных.",
      select: "Выпадающий список для выбора из вариантов option.",
      nav:    "Блок навигации — набор ссылок по сайту.",
      header: "Верхний колонтитул страницы или раздела.",
      footer: "Нижний колонтитул страницы или раздела.",
      main:   "Основное содержимое страницы. Один на страницу.",
      section:"Тематический раздел страницы.",
      article:"Самостоятельный блок контента — пост, новость.",
      aside:  "Боковой контент, косвенно связанный с основным.",
      video:  "Встраивает видеофайл.",
      audio:  "Встраивает аудиофайл.",
      canvas: "Холст для рисования через JavaScript.",
      script: "Встраивает или подключает JavaScript.",
      style:  "Встроенные CSS-правила.",
      link:   "Связывает документ с внешним ресурсом (CSS, иконка).",
      meta:   "Метаданные: кодировка, viewport, описание страницы.",
      title:  "Заголовок документа на вкладке браузера.",
      head:   "Контейнер метаданных. Не отображается на странице.",
      body:   "Корневой элемент видимого содержимого страницы.",
      html:   "Корневой элемент всего документа.",
      strong: "Важный текст — визуально жирный, несёт смысловой вес.",
      em:     "Акцентирование — смысловой упор. Визуально курсив.",
      br:     "Принудительный перенос строки. Пустой элемент.",
      hr:     "Горизонтальная разделительная линия.",
      pre:    "Предварительно форматированный текст (пробелы сохраняются).",
      code:   "Фрагмент программного кода.",
      textarea:"Многострочное текстовое поле.",
      label:  "Подпись к элементу формы. Атрибут for связывает с input.",
      iframe: "Встроенный фрейм — загружает другую страницу внутри.",
    };

    document.getElementById('tag-input').addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;

      const key = this.value.trim().toLowerCase().replace(/[<>\/]/g, '');
      const result = document.getElementById('result');

      if (tags[key]) {
        result.innerHTML = '<b>&lt;' + key + '&gt;</b> — ' + tags[key];
      } else if (key) {
        result.textContent = 'Тег <' + key + '> не найден.';
      }
    });
  </script>

</body>
</html>
